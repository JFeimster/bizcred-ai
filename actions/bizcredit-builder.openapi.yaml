openapi: 3.1.0
info:
  title: BizCredit Builder API
  description: |
    A lightweight API for vendor, readiness, and optional server-side AI generation data for educational purposes.
    Disclaimer: Readiness scoring and generated outputs are educational and do not guarantee approvals, funding, bureau reporting, tradelines, score changes, or lender outcomes. Vendor requirements and reporting behavior may change. Verify directly before applying or relying on reporting.
  version: 1.1.0
servers:
  - url: https://your-production-url.vercel.app
    description: Production server
paths:
  /api/health:
    get:
      operationId: getBizCreditApiHealth
      summary: Health check endpoint
      description: Returns the health status of the API service. For educational use only. No guarantees for approvals, funding, reporting, tradelines, or score changes. Users must verify vendor terms and reporting directly before applying.
      responses:
        '200':
          description: Successful health check response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  version:
                    type: string

  /api/ai-health:
    get:
      operationId: getBizCreditAiHealth
      summary: Check optional AI generation configuration
      description: Returns whether optional server-side AI generation is configured. This does not expose API keys. For educational planning only and not a guarantee of approvals, funding, reporting, tradelines, score changes, or lender outcomes.
      responses:
        '200':
          description: AI configuration status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiHealthResponse'

  /api/vendors:
    get:
      operationId: listBizCreditVendors
      summary: List and filter vendors
      description: Returns a filtered list of vendors for educational planning. For educational use only. No guarantees for approvals, funding, reporting, tradelines, or score changes. Users must verify vendor terms and reporting directly before applying.
      parameters:
        - name: tier
          in: query
          schema:
            type: integer
          description: Filter by vendor tier, for example 1, 2, or 3
        - name: category
          in: query
          schema:
            type: string
          description: Filter by vendor category
        - name: terms
          in: query
          schema:
            type: string
          description: Filter by credit terms, for example Net 30
        - name: reports_to
          in: query
          schema:
            type: string
          description: Filter by credit bureau the vendor reports to
        - name: dnb_reporter
          in: query
          schema:
            type: boolean
          description: Filter vendors that report to Dun & Bradstreet
        - name: requires_pg
          in: query
          schema:
            type: boolean
          description: Filter vendors requiring a personal guarantee
        - name: ein_only
          in: query
          schema:
            type: boolean
          description: Filter vendors that only require an EIN
        - name: min_time_in_business_months_lte
          in: query
          schema:
            type: integer
          description: Filter vendors by maximum required time in business in months
        - name: search
          in: query
          schema:
            type: string
          description: Search vendors by name or description
        - name: limit
          in: query
          schema:
            type: integer
          description: Limit the number of returned vendors
      responses:
        '200':
          description: Successful response with filtered vendor list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorListResponse'

  /api/vendor-by-id:
    get:
      operationId: getBizCreditVendorById
      summary: Get a specific vendor by ID
      description: Returns detailed information for a single vendor by ID. For educational use only. No guarantees for approvals, funding, reporting, tradelines, or score changes. Users must verify vendor terms and reporting directly before applying.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
          description: The ID of the vendor to retrieve
      responses:
        '200':
          description: Successful response with vendor details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Vendor'
                  disclaimer:
                    type: string
        '404':
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vendor-summary:
    get:
      operationId: getBizCreditVendorSummary
      summary: Get summary statistics for vendors
      description: Returns aggregated counts and statistics of available vendors for educational context. For educational use only. No guarantees for approvals, funding, reporting, tradelines, or score changes. Users must verify vendor terms and reporting directly before applying.
      responses:
        '200':
          description: Successful response with vendor summary data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorSummaryResponse'

  /api/readiness-rules:
    get:
      operationId: getBizCreditReadinessRules
      summary: Get readiness scoring rules and setup tasks
      description: Returns the criteria used for educational readiness scoring and the list of setup tasks. For educational use only. No guarantees for approvals, funding, reporting, tradelines, or score changes. Users must verify vendor terms and reporting directly before applying.
      responses:
        '200':
          description: Successful response with readiness rules and setup tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessRulesResponse'

  /api/generate-readiness-plan:
    post:
      operationId: generateBizCreditReadinessPlan
      summary: Generate an educational readiness plan
      description: Optional server-side AI endpoint that generates an educational readiness plan from dashboard state. It must not guarantee approvals, funding, bureau reporting, tradelines, score changes, or lender outcomes. Users must verify vendor and lender terms directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiGenerationRequest'
      responses:
        '200':
          description: AI readiness plan response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiReadinessPlanResponse'
        '503':
          description: AI is unavailable or not configured; fallback prompt returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiFallbackResponse'

  /api/explain-vendor-path:
    post:
      operationId: explainBizCreditVendorPath
      summary: Explain an educational vendor path
      description: Optional server-side AI endpoint that explains vendor sequence and tracker status for educational planning. It must not guarantee approvals, bureau reporting, tradelines, funding, score changes, or lender outcomes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiGenerationRequest'
      responses:
        '200':
          description: AI vendor path explanation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiVendorPathResponse'
        '503':
          description: AI is unavailable or not configured; fallback prompt returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiFallbackResponse'

  /api/generate-gpt-prompt:
    post:
      operationId: generateBizCreditGptPrompt
      summary: Generate a BizCredit Builder GPT prompt
      description: Optional server-side AI endpoint that generates a copy/paste prompt for BizCredit Builder GPT from dashboard state. It must remain educational and avoid guarantees or credit repair framing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiGenerationRequest'
      responses:
        '200':
          description: AI generated GPT prompt response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiGptPromptResponse'
        '503':
          description: AI is unavailable or not configured; fallback prompt returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiFallbackResponse'

components:
  schemas:
    Vendor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tier:
          type: integer
        category:
          type: string
        terms:
          type: string
        requires_pg:
          type: boolean
        ein_only:
          type: boolean
        min_time_in_business_months:
          type: integer
        reports_to:
          type: array
          items:
            type: string
      required:
        - id
        - name

    VendorListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Vendor'
        meta:
          type: object
          properties:
            total:
              type: integer
            returned:
              type: integer
            filters:
              type: object
        disclaimer:
          type: string
      required:
        - data
        - meta
        - disclaimer

    VendorSummaryResponse:
      type: object
      properties:
        total_vendors:
          type: integer
        count_by_tier:
          type: object
          additionalProperties:
            type: integer
        count_by_category:
          type: object
          additionalProperties:
            type: integer
        count_by_terms:
          type: object
          additionalProperties:
            type: integer
        count_by_bureau:
          type: object
          additionalProperties:
            type: integer
        count_requiring_pg:
          type: integer
        count_ein_only:
          type: integer
        count_reporting_to_dnb:
          type: integer
        disclaimer:
          type: string
      required:
        - total_vendors
        - disclaimer

    ReadinessRulesResponse:
      type: object
      properties:
        setup_tasks:
          type: array
          items:
            type: object
        readiness_rules:
          type: object
        disclaimer:
          type: string
      required:
        - setup_tasks
        - readiness_rules
        - disclaimer

    AiHealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        service:
          type: string
        aiConfigured:
          type: boolean
        model:
          type:
            - string
            - 'null'
        disclaimer:
          type: string
      required:
        - ok
        - aiConfigured
        - disclaimer

    AiGenerationRequest:
      type: object
      description: Dashboard, vendor, profile, or tracker state used for educational generation.
      additionalProperties: true

    AiReadinessPlanResponse:
      type: object
      properties:
        ok:
          type: boolean
        source:
          type: string
        model:
          type: string
        plan:
          type: string
        disclaimer:
          type: string
      required:
        - ok
        - plan
        - disclaimer

    AiVendorPathResponse:
      type: object
      properties:
        ok:
          type: boolean
        source:
          type: string
        model:
          type: string
        explanation:
          type: string
        disclaimer:
          type: string
      required:
        - ok
        - explanation
        - disclaimer

    AiGptPromptResponse:
      type: object
      properties:
        ok:
          type: boolean
        source:
          type: string
        model:
          type: string
        prompt:
          type: string
        disclaimer:
          type: string
      required:
        - ok
        - prompt
        - disclaimer

    AiFallbackResponse:
      type: object
      properties:
        ok:
          type: boolean
        fallback:
          type: boolean
        error:
          type: string
        fallbackPrompt:
          type: string
        disclaimer:
          type: string
      required:
        - ok
        - fallback
        - fallbackPrompt
        - disclaimer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
