openapi: 3.1.0
info:
  title: BizCredit Custom GPT Directory API
  version: 1.0.0
  description: API for retrieving custom GPT directory for educational planning.
servers:
  - url: https://your-app-url.vercel.app/api
paths:
  /gpt-directory:
    get:
      operationId: getCustomGpts
      summary: Retrieves a list of custom GPTs.
      description: |
        Retrieves a directory of custom GPTs.
        **DISCLAIMER: This information is for educational planning only and provides no guarantees for approvals, funding, reporting, tradelines, or score changes. Users must verify vendor terms directly before applying.**
        Note: This is an optional supporting action, not the canonical BizCredit vendor/readiness schema.
      responses:
        '200':
          description: A JSON array of custom GPTs.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    recommended_stage:
                      type: string
                    keyword:
                      type: string
                    category:
                      type: string
                    is_duplicate:
                      type: boolean
                    has_access_url:
                      type: boolean
                    verification_status:
                      type: string
