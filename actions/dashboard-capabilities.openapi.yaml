openapi: 3.1.0
info:
  title: BizCredit OS Capabilities API
  version: 1.0.0
  description: >
    Read-only catalog of BizCredit OS app capabilities and action schemas.
    Educational planning only. No guarantees for approval, funding, reporting,
    tradelines, score changes, or lender outcomes. Users must verify vendor terms directly.
servers:
  - url: https://your-production-url.vercel.app
    description: Production Server

paths:
  /api/dashboard-capabilities:
    get:
      operationId: getBizCreditDashboardCapabilities
      summary: Get the app's read-only capabilities catalog
      description: >
        Returns a read-only catalog of what the BizCredit OS app can do, active modules,
        browser-only workflows, and future gated workflows. This endpoint does not read user data
        and does not perform sync.
      responses:
        '200':
          description: Capabilities catalog successfully returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardCapabilitiesResponse'
        '405':
          description: Method not allowed

  /api/action-manifest:
    get:
      operationId: getBizCreditActionManifest
      summary: Get the list of OpenAPI action schemas
      description: >
        Returns a read-only list of available, secondary, legacy, and future OpenAPI action schemas.
        This endpoint does not create, import, or sync schemas.
      responses:
        '200':
          description: Action manifest successfully returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionManifestResponse'
        '405':
          description: Method not allowed

components:
  schemas:
    DashboardCapabilitiesResponse:
      type: object
      properties:
        app:
          type: string
        version:
          type: string
        mode:
          type: string
        activePages:
          type: array
          items:
            type: string
        activeLocalStorageAreas:
          type: array
          items:
            type: string
        readOnlyApis:
          type: array
          items:
            type: string
        browserOnlyWorkflows:
          type: array
          items:
            type: string
        futureGatedWorkflows:
          type: array
          items:
            type: string
        safety:
          type: object
          properties:
            noPublicWrites:
              type: boolean
            noPublicImports:
              type: boolean
            noLiveNotionSync:
              type: boolean
            noUserDataReturned:
              type: boolean
            educationalOnly:
              type: boolean
        disclaimer:
          type: string
      required:
        - app
        - mode
        - activePages
        - readOnlyApis
        - browserOnlyWorkflows
        - futureGatedWorkflows
        - safety
        - disclaimer

    ActionManifestItem:
      type: object
      properties:
        file:
          type: string
        status:
          type: string
          enum: [canonical, secondary, legacy_reference, future_do_not_create_yet]
        safeForNoAuth:
          type: boolean
        endpointFamily:
          type: string
        importIntoGPT:
          type: boolean
        notes:
          type: string
      required:
        - file
        - status
        - safeForNoAuth
        - endpointFamily
        - importIntoGPT

    ActionManifestResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ActionManifestItem'
        disclaimer:
          type: string
      required:
        - data
        - disclaimer
