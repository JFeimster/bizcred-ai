openapi: 3.1.0
info:
  title: BizCredit Funding Tools Directory API
  version: 1.0.0
  description: API for retrieving funding tools directory for educational planning.
servers:
  - url: https://your-app-url.vercel.app/api
paths:
  /funding-tools:
    get:
      operationId: getFundingTools
      summary: Retrieves a list of funding tools.
      description: |
        Retrieves a directory of funding tools.
        **DISCLAIMER: This information is for educational planning only and provides no guarantees for approvals, funding, reporting, tradelines, or score changes. Users must verify vendor terms directly before applying.**
        Note: This is an optional supporting action, not the canonical BizCredit vendor/readiness schema.
      responses:
        '200':
          description: A JSON array of funding tools.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    persona:
                      type: string
                    problem_keyword:
                      type: string
                    asset_type:
                      type: string
                    build_state:
                      type: string
                    status:
                      type: string
                    partner_channel:
                      type: string
                    verification_status:
                      type: string
